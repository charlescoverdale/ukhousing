url: https://charlescoverdale.github.io/ukhousing/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]

reference:
  - title: "House Price Index"
    desc: "UK HPI from HM Land Registry"
    contents:
      - ukh_hpi
      - ukh_hpi_compare

  - title: "Price Paid Data"
    desc: "Individual property transactions"
